[[repos]]
repo = "builtin"
hooks = [
    { id = "check-added-large-files", args = ["--maxkb=1024"] },
    { id = "check-toml" },
    { id = "check-case-conflict" },
    { id = "detect-private-key" },
    { id = "end-of-file-fixer" },
    { id = "trailing-whitespace" },
]

[[repos]]
repo = "local"
hooks = [
    { id = "just fmt", name = "just fmt", language = "system", entry = "just fmt", pass_filenames = false },
    { id = "just lint", name = "just lint", language = "system", entry = "just lint", pass_filenames = false },
    { id = "just test", name = "just test", language = "system", entry = "just test", pass_filenames = false },
]

